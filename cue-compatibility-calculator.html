<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cue Compatibility Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface-2: #1a1a26;
  --surface-3: #222233;
  --border: #2a2a3d;
  --border-light: #3a3a55;
  --text: #e8e6f0;
  --text-dim: #8a88a0;
  --text-muted: #5a5872;
  --accent: #c4a0ff;
  --accent-dim: #9070cc;
  --accent-glow: rgba(196, 160, 255, 0.15);
  --gold: #f0d080;
  --gold-dim: #b89840;
  --rose: #ff80a0;
  --teal: #60d0c0;
  --enemy: #ff6070;
  --neutral: #f0d080;
  --friendly: #60d0c0;
  --radius: 12px;
  --radius-lg: 20px;
}

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(196,160,255,0.04), transparent),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(240,208,128,0.03), transparent);
  pointer-events: none;
  z-index: 0;
}

/* --- Sticky Input Section --- */
.input-section {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 20px 0 24px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.input-section::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 0; right: 0;
  height: 20px;
  background: linear-gradient(to bottom, var(--bg), transparent);
  pointer-events: none;
}

.input-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
}

.app-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem;
  color: var(--accent);
  text-align: center;
  margin-bottom: 18px;
  letter-spacing: 0.02em;
}

.app-title span {
  color: var(--gold);
  font-style: italic;
}

/* --- Date Input Layout --- */
.date-inputs-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 20px;
  align-items: end;
}

.person-input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.person-input-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.date-boxes {
  display: flex;
  align-items: center;
  gap: 0;
}

.date-field {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.date-field label {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}

.date-field input {
  width: 52px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 0;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 1.15rem;
  font-weight: 500;
  text-align: center;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  letter-spacing: 0.05em;
  -moz-appearance: textfield;
}

.date-field input::-webkit-outer-spin-button,
.date-field input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.date-field input:focus {
  border-color: var(--accent-dim);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.date-field input.filled {
  border-color: var(--border-light);
  color: var(--text);
}

.date-field input.p2:focus {
  border-color: var(--gold-dim);
  box-shadow: 0 0 0 3px rgba(240, 208, 128, 0.15);
}

.date-field.year-field input {
  width: 68px;
}

.date-sep {
  font-family: 'Instrument Serif', serif;
  font-size: 1.3rem;
  color: var(--text-muted);
  padding: 0 6px;
  padding-top: 14px;
  user-select: none;
}

.vs-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding-bottom: 2px;
}

.vs-divider span {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 1.2rem;
  color: var(--text-muted);
}

/* --- Results Section --- */
.results-section {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

.placeholder-msg {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
  font-style: italic;
  font-size: 0.95rem;
}

/* --- Score Ring --- */
.score-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
  animation: fadeUp 0.5s ease-out;
}

.score-ring-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  margin-bottom: 16px;
}

.score-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-ring-bg { fill: none; stroke: var(--surface-3); stroke-width: 8; }

.score-ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease-out, stroke 0.3s;
}

.score-value {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.score-number {
  font-family: 'Instrument Serif', serif;
  font-size: 3.2rem;
  line-height: 1;
  color: var(--text);
}

.score-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  margin-top: 4px;
}

.score-tier {
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  padding: 4px 16px;
  border-radius: 20px;
}

.tier-friendly { color: var(--friendly); background: rgba(96,208,192,0.1); border: 1px solid rgba(96,208,192,0.2); }
.tier-neutral { color: var(--neutral); background: rgba(240,208,128,0.1); border: 1px solid rgba(240,208,128,0.2); }
.tier-enemy { color: var(--enemy); background: rgba(255,96,112,0.1); border: 1px solid rgba(255,96,112,0.2); }

/* --- Person Cards --- */
.persons-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 32px;
  animation: fadeUp 0.5s ease-out 0.1s both;
}

.person-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  position: relative;
  overflow: hidden;
}

.person-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.person-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), transparent); }
.person-card:nth-child(2)::before { background: linear-gradient(90deg, transparent, var(--gold)); }

.person-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.person-lp {
  font-family: 'Instrument Serif', serif;
  font-size: 2.4rem;
  line-height: 1.1;
  margin-bottom: 2px;
}

.person-card:nth-child(1) .person-lp { color: var(--accent); }
.person-card:nth-child(2) .person-lp { color: var(--gold); }

.person-lp-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
}

.person-details { display: flex; flex-direction: column; gap: 10px; }

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.detail-row:last-child { border-bottom: none; }

.detail-key {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
}

.detail-val {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
}

/* --- Breakdown --- */
.breakdown { animation: fadeUp 0.5s ease-out 0.2s both; }

.breakdown-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.breakdown-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.breakdown-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.bk-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 6px; }
.bk-pair { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 4px; }
.bk-value { font-family: 'Instrument Serif', serif; font-size: 1.6rem; }
.bk-contrib { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

/* --- Formula --- */
.formula-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  font-family: 'DM Sans', monospace;
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.8;
  overflow-x: auto;
  animation: fadeUp 0.5s ease-out 0.3s both;
}

.formula-box .highlight { color: var(--accent); font-weight: 500; }

/* --- Tier Legend --- */
.tier-legend {
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  animation: fadeUp 0.5s ease-out 0.4s both;
}

.tier-legend-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.tier-legend-items {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.tier-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.tier-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tier-dot.friendly { background: var(--friendly); }
.tier-dot.neutral { background: var(--neutral); }
.tier-dot.enemy { background: var(--enemy); }

.tier-legend-label {
  font-size: 0.8rem;
  color: var(--text-dim);
}

.tier-legend-range {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-left: 2px;
}

/* --- Responsive --- */
@media (max-width: 700px) {
  .date-inputs-row {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .vs-divider { padding: 4px 0; }
  .persons-grid { grid-template-columns: 1fr; }
  .breakdown-grid { grid-template-columns: 1fr; }
  .app-title { font-size: 1.3rem; }
  .score-ring-wrap { width: 160px; height: 160px; }
  .score-number { font-size: 2.6rem; }
  .date-boxes { justify-content: center; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

// AUTO-ADVANCE INPUT LOGIC

const allInputs = document.querySelectorAll('.date-field input');

allInputs.forEach(input => {
  // Only allow digits
  input.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '');

    if (e.target.value.length > 0) {
      e.target.classList.add('filled');
    } else {
      e.target.classList.remove('filled');
    }

    // Auto-advance when max digits reached
    const max = parseInt(e.target.dataset.max);
    if (e.target.value.length >= max && e.target.dataset.next) {
      const next = document.getElementById(e.target.dataset.next);
      if (next) {
        next.focus();
        next.select();
      }
    }

    tryCalculate();
  });

  // Backspace on empty field goes to previous
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && e.target.value === '' && e.target.dataset.prev) {
      e.preventDefault();
      const prev = document.getElementById(e.target.dataset.prev);
      if (prev) {
        prev.focus();
        const len = prev.value.length;
        prev.setSelectionRange(len, len);
      }
    }
  });

  // Select all on focus for easy overwrite
  input.addEventListener('focus', () => {
    setTimeout(() => input.select(), 0);
  });
});

// ============================================================
// CALCULATION ENGINE
// ============================================================

function digitSum(n) {
  return String(n).split('').reduce((s, c) => s + parseInt(c), 0);
}

function reduceToLP(n) {
  while (n > 9 && ![11,22,28,33].includes(n)) {
    n = digitSum(n);
  }
  return n;
}

function calcLP(month, day, year) {
  let raw = 0;
  if (month === 11) raw += 11;
  else raw += digitSum(month);
  if (day === 11 || day === 22) raw += day;
  else raw += digitSum(day);
  raw += digitSum(year);

  let lp = reduceToLP(raw);
  if (lp === 2) lp = 11;

  let display;
  if (lp === 28) {
    display = '28/1';
  } else if (lp === 33) {
    const pure = (month <= 9) && (day <= 9);
    display = pure ? '33' : '33/6';
  } else {
    display = `${lp}/${raw}`;
  }

  return { lp, raw, display };
}

function calcSLP(day) {
  if (day === 11 || day === 22 || day === 28) return day;
  let n = day;
  while (n > 9) n = digitSum(n);
  return n;
}

function getEasternAnimal(month, day, year) {
  let effectiveYear = year;
  const lny = LUNAR_NY[year];
  if (lny) {
    const [lnyMonth, lnyDay] = lny;
    if (month < lnyMonth || (month === lnyMonth && day < lnyDay)) {
      effectiveYear = year - 1;
    }
  }
  const idx = ((effectiveYear - 1924) % 12 + 12) % 12;
  return { animal: EAST_ANIMALS[idx], index: idx };
}

function getWesternSign(month, day) {
  const ranges = [
    [3,21,4,19,'Aries',0],[4,20,5,20,'Taurus',1],[5,21,6,20,'Gemini',2],
    [6,21,7,22,'Cancer',3],[7,23,8,22,'Leo',4],[8,23,9,22,'Virgo',5],
    [9,23,10,22,'Libra',6],[10,23,11,21,'Scorpio',7],[11,22,12,21,'Sagittarius',8],
    [1,20,2,18,'Aquarius',10],[2,19,3,20,'Pisces',11]
  ];
  for (const [sm, sd, em, ed, name, idx] of ranges) {
    if ((month === sm && day >= sd) || (month === em && day <= ed)) {
      return { sign: name, index: idx };
    }
  }
  return { sign: 'Capricorn', index: 9 };
}

function calcScore(d1, d2) {
  const lp1 = calcLP(d1.month, d1.day, d1.year);
  const lp2 = calcLP(d2.month, d2.day, d2.year);
  const slp1 = calcSLP(d1.day);
  const slp2 = calcSLP(d2.day);
  const east1 = getEasternAnimal(d1.month, d1.day, d1.year);
  const east2 = getEasternAnimal(d2.month, d2.day, d2.year);
  const west1 = getWesternSign(d1.month, d1.day);
  const west2 = getWesternSign(d2.month, d2.day);

  const lpPct = LP_COMPAT[lp1.lp]?.[lp2.lp] ?? 50;
  const eastPct = EAST_COMPAT[east1.index][east2.index];
  const westPct = WEST_COMPAT[west1.index][west2.index];
  const slpAdj = SLP_COMPAT[slp1]?.[slp2] ?? 0;

  const lpContrib = 0.618 * lpPct;
  const eastContrib = 0.495 * eastPct;
  const westContrib = 0.053 * westPct;
  const score = lpContrib + eastContrib + westContrib - 12.81 + slpAdj;

  return {
    score: Math.round(score * 100) / 100,
    lp1, lp2, slp1, slp2,
    east1, east2, west1, west2,
    lpPct, eastPct, westPct, slpAdj,
    lpContrib, eastContrib, westContrib
  };
}

// ============================================================

function getPersonDate(prefix) {
  const m = parseInt(document.getElementById(prefix + 'm').value);
  const d = parseInt(document.getElementById(prefix + 'd').value);
  const y = parseInt(document.getElementById(prefix + 'y').value);
  if (isNaN(m) || isNaN(d) || isNaN(y)) return null;
  if (m < 1 || m > 12 || d < 1 || d > 31 || y < 1900 || y > 2099) return null;
  return { month: m, day: d, year: y };
}

function tryCalculate() {
  const d1 = getPersonDate('p1');
  const d2 = getPersonDate('p2');
  if (!d1 || !d2) {
    document.getElementById('results').innerHTML =
      '<div class="placeholder-msg">Enter two birth dates above to reveal your compatibility reading.</div>';
    return;
  }
  const data = calcScore(d1, d2);
  renderResults(data);
}
